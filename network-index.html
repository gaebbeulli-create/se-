<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NETWORK</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html, body, #root { height:100%; }
body { font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif; font-size:14px; color:#1E1E1E; -webkit-font-smoothing:antialiased; }
::-webkit-scrollbar { width:5px } ::-webkit-scrollbar-thumb { background:rgba(0,0,0,0.12); border-radius:3px }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes msgSlide { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes spin { to{transform:rotate(360deg)} }
input:focus,textarea:focus { outline:none }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

// ═══════════════════════════════════════
// 데모 계정
// ═══════════════════════════════════════
const DEMO_USERS = [
  { id: "hq", name: "김대표", role: "hq_admin", org: "본사", email: "admin@teambro.kr", pw: "1234", icon: "👔", desc: "전체 관리 권한" },
  { id: "staff", name: "이과장", role: "hq_staff", org: "본사", email: "staff@teambro.kr", pw: "1234", icon: "🏢", desc: "본사 운영 담당" },
  { id: "agency", name: "박매니저", role: "agency", org: "SE글로벌", email: "se@seglobal.kr", pw: "1234", icon: "🏭", desc: "파트너사 담당자" },
];

const CHANNELS = [
  { path: "home", label: "홈", icon: "🏠" },
  { divider: true, label: "운영" },
  { path: "contracts", label: "계약관리", icon: "📝" },
  { path: "inventory", label: "차량재고", icon: "📦" },
  { path: "dispatch", label: "출고현황", icon: "🚚" },
  { divider: true, label: "이슈" },
  { path: "incidents", label: "사고접수", icon: "⚠️" },
  { path: "claims", label: "클레임", icon: "🧾" },
  { divider: true, label: "소통" },
  { path: "notices", label: "공지사항", icon: "📢" },
  { path: "requests", label: "요청/건의", icon: "💬" },
  { path: "meetings", label: "회의록", icon: "📋" },
  { divider: true, label: "기타" },
  { path: "schedule", label: "일정/스케줄", icon: "📅" },
  { path: "files", label: "파일공유", icon: "📁" },
];

const QUICK = [
  { path: "contracts", icon: "📝", label: "계약관리", desc: "렌탈 계약 현황", color: "#3B82F6" },
  { path: "inventory", icon: "📦", label: "차량재고", desc: "재고·배정 현황", color: "#10B981" },
  { path: "dispatch", icon: "🚚", label: "출고현황", desc: "출고·입고 확인", color: "#F59E0B" },
  { path: "incidents", icon: "⚠️", label: "사고접수", desc: "사고 처리 현황", color: "#EF4444" },
  { path: "claims", icon: "🧾", label: "클레임", desc: "클레임 접수·처리", color: "#8B5CF6" },
  { path: "notices", icon: "📢", label: "공지사항", desc: "업무 공지", color: "#EC4899" },
  { path: "requests", icon: "💬", label: "요청/건의", desc: "협의·요청 사항", color: "#06B6D4" },
  { path: "meetings", icon: "📋", label: "회의록", desc: "회의 내용 관리", color: "#F97316" },
  { path: "schedule", icon: "📅", label: "일정", desc: "공유 일정", color: "#14B8A6" },
  { path: "files", icon: "📁", label: "파일", desc: "공유 문서", color: "#6366F1" },
];

const CH_DESC = {
  contracts: "전기바이크 렌탈 계약을 관리합니다.",
  inventory: "OK1 KS, PRO 등 전기바이크 재고 및 배정 현황을 확인합니다.",
  dispatch: "출고 및 입고 현황을 관리합니다.",
  incidents: "차량 사고 접수 및 보험 처리 진행 상황을 추적합니다.",
  claims: "정비·요금·AS 관련 클레임을 접수하고 처리합니다.",
  notices: "업무 공지사항을 공유합니다.",
  requests: "업무 요청 및 건의사항을 주고받습니다.",
  meetings: "회의 내용, 결정 사항, 실행 항목을 기록하고 공유합니다.",
  schedule: "공동 일정 및 마감 기한을 관리합니다.",
  files: "계약서·정산서·점검표 등 업무 문서를 공유합니다.",
};

function App() {
  const [page, setPage] = useState("landing");
  const [user, setUser] = useState(null);
  const [channel, setChannel] = useState("home");
  const [collapsed, setCollapsed] = useState(false);

  const loginAs = (u) => { setUser(u); setPage("app"); setChannel("home"); };
  const logout = () => { setUser(null); setPage("landing"); };

  // ═══════════════════════════
  // LANDING
  // ═══════════════════════════
  if (page === "landing") {
    return (
      <div style={{ color:"#1E1E1E", background:"#fff", minHeight:"100vh", display:"flex", flexDirection:"column" }}>
        <nav style={{ position:"sticky", top:0, zIndex:100, background:"rgba(255,255,255,0.9)", backdropFilter:"blur(12px)", borderBottom:"1px solid #F0F0F2" }}>
          <div style={{ maxWidth:1060, margin:"0 auto", padding:"0 28px", height:56, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div style={{ display:"flex", alignItems:"center", gap:9 }}>
              <div style={{ width:30, height:30, borderRadius:8, background:"#1E1E1E", display:"flex", alignItems:"center", justifyContent:"center", fontSize:8, fontWeight:800, color:"#fff", letterSpacing:0.5 }}>N</div>
              <span style={{ fontSize:16, fontWeight:800, letterSpacing:1.5 }}>NETWORK</span>
            </div>
            <button onClick={()=>setPage("login")} style={{ padding:"7px 18px", borderRadius:8, fontSize:13, fontWeight:600, border:"none", background:"#1E1E1E", color:"#fff", cursor:"pointer", fontFamily:"inherit" }}>로그인</button>
          </div>
        </nav>

        <section style={{ flex:1, maxWidth:1060, margin:"0 auto", padding:"64px 28px 48px", display:"flex", alignItems:"center", gap:48 }}>
          <div style={{ flex:"0 0 340px", animation:"fadeUp 0.5s ease" }}>
            <div style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"5px 12px 5px 7px", borderRadius:20, background:"#F3F4F6", border:"1px solid #E5E7EB", fontSize:12, fontWeight:600, color:"#6B7280", marginBottom:20 }}>
              <span style={{ padding:"2px 6px", borderRadius:8, background:"#1E1E1E", color:"#fff", fontSize:10, fontWeight:700 }}>내부</span>
              업무 전용 시스템
            </div>
            <h1 style={{ fontSize:36, fontWeight:800, lineHeight:1.3, letterSpacing:-0.8, marginBottom:14 }}>대화하듯<br/>일합니다</h1>
            <p style={{ fontSize:15, lineHeight:1.75, color:"#9CA3AF", marginBottom:32 }}>계약, 출고, 사고, 클레임까지<br/>채널에서 바로 공유하고 처리합니다.</p>
            <button onClick={()=>setPage("login")} style={{ padding:"13px 32px", borderRadius:10, fontSize:15, fontWeight:700, border:"none", background:"#1E1E1E", color:"#fff", cursor:"pointer", fontFamily:"inherit", boxShadow:"0 2px 8px rgba(0,0,0,0.12)" }}>접속하기 →</button>
            <div style={{ display:"flex", gap:16, marginTop:24, fontSize:12, color:"#C0C3C8" }}>
              {["웹 브라우저 접속","설치 불필요","모바일 지원"].map(t=><span key={t}>✓ {t}</span>)}
            </div>
          </div>

          <div style={{ flex:1, animation:"fadeUp 0.6s ease 0.15s both" }}>
            <div style={{ background:"#fff", borderRadius:14, overflow:"hidden", border:"1px solid #E5E7EB", boxShadow:"0 20px 60px rgba(0,0,0,0.08)" }}>
              <div style={{ height:40, background:"#FAFBFC", borderBottom:"1px solid #ECEDF0", display:"flex", alignItems:"center", padding:"0 14px", gap:6 }}>
                <div style={{ display:"flex", gap:5 }}>
                  <div style={{ width:10, height:10, borderRadius:"50%", background:"#FF5F57" }}/>
                  <div style={{ width:10, height:10, borderRadius:"50%", background:"#FEBC2E" }}/>
                  <div style={{ width:10, height:10, borderRadius:"50%", background:"#28C840" }}/>
                </div>
                <span style={{ marginLeft:12, fontSize:11.5, fontWeight:600, color:"#9CA3AF" }}>NETWORK</span>
              </div>
              <div style={{ display:"flex", height:340 }}>
                <div style={{ width:150, background:"#1B1D21", padding:"12px 8px", flexShrink:0 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:14, padding:"0 4px" }}>
                    <div style={{ width:20, height:20, borderRadius:5, background:"#fff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:7, fontWeight:800, color:"#1B1D21" }}>N</div>
                    <span style={{ color:"#fff", fontSize:11, fontWeight:700, letterSpacing:1 }}>NETWORK</span>
                  </div>
                  {["📢 공지사항","📝 계약관리","📦 차량재고","🚚 출고현황","⚠️ 사고접수","📋 회의록"].map((c,i)=>(
                    <div key={i} style={{ padding:"5px 8px", borderRadius:5, marginBottom:1, background:i===1?"rgba(255,255,255,0.1)":"transparent", color:i===1?"#fff":"rgba(255,255,255,0.4)", fontSize:11, fontWeight:i===1?600:400 }}>{c}</div>
                  ))}
                </div>
                <div style={{ flex:1, display:"flex", flexDirection:"column", background:"#F7F8FA" }}>
                  <div style={{ height:36, borderBottom:"1px solid #ECEDF0", display:"flex", alignItems:"center", padding:"0 14px", background:"#fff", gap:6 }}>
                    <span style={{ fontSize:13 }}>📝</span><span style={{ fontSize:12.5, fontWeight:700 }}>계약관리</span>
                  </div>
                  <div style={{ flex:1, padding:"12px 14px", overflowY:"auto" }}>
                    <div style={{ textAlign:"center", marginBottom:12 }}><span style={{ background:"#E8E9EC", borderRadius:10, padding:"2px 10px", fontSize:10, color:"#9CA3AF" }}>오늘</span></div>
                    {[
                      { av:"🏢", nm:"장비팀", t:"오전 9:00", msg:"CT-202603-0012 홍길동님 OK1 KS 계약 등록 완료했습니다.", badge:{text:"진행",bg:"#EFF6FF",c:"#1D4ED8",bd:"#BFDBFE"}, file:"계약서_홍길동.pdf" },
                      { av:"🏪", nm:"성서지점", t:"오전 9:15", msg:"확인했습니다. 출고는 오후에 가능한가요?" },
                      { av:"🏢", nm:"장비팀", t:"오전 9:20", msg:"오후 2시 출고 준비 완료 예정입니다.", file:"출고_체크리스트.pdf" },
                      { av:"🏢", nm:"운영팀", t:"오전 10:30", msg:"CT-202603-0008 김철수님 연체 3개월 — 회수 절차 진행합니다.", alert:true, badge:{text:"연체",bg:"#FEF2F2",c:"#DC2626",bd:"#FECACA"} },
                      { av:"🏪", nm:"성서지점", t:"오전 10:45", msg:"연락 시도 중입니다. 내일까지 회신 없으면 회수팀 요청드립니다." },
                    ].map((m,i)=>(
                      <div key={i} style={{ display:"flex", gap:8, marginBottom:10, animation:`msgSlide 0.3s ease ${0.6+i*0.15}s both` }}>
                        <div style={{ width:26, height:26, borderRadius:6, background:"#F1F2F4", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, flexShrink:0 }}>{m.av}</div>
                        <div style={{ flex:1 }}>
                          <div style={{ display:"flex", alignItems:"center", gap:5, marginBottom:2 }}>
                            <span style={{ fontSize:11, fontWeight:700 }}>{m.nm}</span>
                            <span style={{ fontSize:9.5, color:"#C0C3C8" }}>{m.t}</span>
                          </div>
                          <div style={{ background:m.alert?"#FEF2F2":"#fff", border:m.alert?"1px solid #FECACA":"1px solid #ECEDF0", borderRadius:"3px 10px 10px 10px", padding:"7px 10px" }}>
                            {m.badge&&<span style={{ display:"inline-block", marginBottom:3, padding:"1px 5px", borderRadius:4, fontSize:9.5, fontWeight:700, background:m.badge.bg, color:m.badge.c, border:`1px solid ${m.badge.bd}` }}>{m.badge.text}</span>}
                            <div style={{ fontSize:11.5, color:m.alert?"#B91C1C":"#374151", lineHeight:1.5, fontWeight:m.alert?600:400 }}>{m.msg}</div>
                            {m.file&&<div style={{ display:"flex", alignItems:"center", gap:5, marginTop:5, padding:"4px 7px", borderRadius:5, background:"#F9FAFB", border:"1px solid #F0F0F2" }}>
                              <div style={{ width:20, height:20, borderRadius:4, background:"#DC2626", color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:7, fontWeight:800 }}>PDF</div>
                              <span style={{ fontSize:10.5, fontWeight:600, color:"#555" }}>{m.file}</span>
                            </div>}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={{ padding:"8px 14px", borderTop:"1px solid #ECEDF0", background:"#fff" }}>
                    <div style={{ padding:"7px 11px", borderRadius:8, background:"#F7F8FA", border:"1px solid #ECEDF0", fontSize:11, color:"#C0C3C8" }}>메시지를 입력하세요...</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <footer style={{ borderTop:"1px solid #F0F0F2", padding:"20px 28px", textAlign:"center", fontSize:12, color:"#C0C3C8" }}>NETWORK · 내부 업무용 · 외부 공개 금지</footer>
      </div>
    );
  }

  // ═══════════════════════════
  // LOGIN — 계정 선택 방식
  // ═══════════════════════════
  if (page === "login") {
    return (
      <div style={{ minHeight:"100vh", background:"#F5F6F8", display:"flex", flexDirection:"column" }}>
        <div style={{ padding:"18px 28px" }}>
          <div onClick={()=>setPage("landing")} style={{ display:"flex", alignItems:"center", gap:9, cursor:"pointer", width:"fit-content" }}>
            <div style={{ width:28, height:28, borderRadius:7, background:"#1E1E1E", display:"flex", alignItems:"center", justifyContent:"center", fontSize:8, fontWeight:800, color:"#fff" }}>N</div>
            <span style={{ fontSize:15, fontWeight:800, letterSpacing:1.5 }}>NETWORK</span>
          </div>
        </div>

        <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", padding:"0 20px 60px" }}>
          <div style={{ width:"100%", maxWidth:420, animation:"fadeUp 0.4s ease" }}>
            <div style={{ textAlign:"center", marginBottom:28 }}>
              <h1 style={{ fontSize:24, fontWeight:800, marginBottom:6 }}>업무 공간 접속</h1>
              <p style={{ fontSize:14, color:"#9CA3AF" }}>계정을 선택하여 접속하세요</p>
            </div>

            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {DEMO_USERS.map(u=>(
                <div key={u.id} onClick={()=>loginAs(u)} style={{
                  display:"flex", alignItems:"center", gap:14, padding:"16px 18px",
                  background:"#fff", borderRadius:12, border:"1px solid #ECEDF0",
                  cursor:"pointer", transition:"all 0.15s",
                  boxShadow:"0 1px 3px rgba(0,0,0,0.03)",
                }}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor="#D1D5DB";e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,0.06)";e.currentTarget.style.transform="translateY(-1px)"}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="#ECEDF0";e.currentTarget.style.boxShadow="0 1px 3px rgba(0,0,0,0.03)";e.currentTarget.style.transform="translateY(0)"}}
                >
                  <div style={{ width:44, height:44, borderRadius:10, background:"#F3F4F6", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>{u.icon}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:14, fontWeight:700, marginBottom:2 }}>{u.name}</div>
                    <div style={{ fontSize:12, color:"#9CA3AF" }}>{u.org} · {u.desc}</div>
                  </div>
                  <div style={{ fontSize:12, color:"#D1D5DB" }}>→</div>
                </div>
              ))}
            </div>

            <div style={{ textAlign:"center", marginTop:20 }}>
              <p style={{ fontSize:11.5, color:"#9CA3AF", lineHeight:1.6 }}>데모 계정으로 접속됩니다. 실제 운영 시 Supabase Auth를 연동하세요.</p>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ═══════════════════════════
  // APP
  // ═══════════════════════════
  const sideW = collapsed ? 56 : 220;
  const activeChannel = CHANNELS.find(c=>c.path===channel);
  const chInfo = QUICK.find(q=>q.path===channel);
  const greet = () => { const h=new Date().getHours(); return h<12?"좋은 아침이에요":h<18?"좋은 오후에요":"수고하셨습니다" };
  const isHQ = user?.role?.startsWith("hq");

  return (
    <div style={{ display:"flex", height:"100vh", overflow:"hidden" }}>
      {/* SIDEBAR */}
      <aside style={{ width:sideW, background:"#1B1D21", display:"flex", flexDirection:"column", borderRight:"1px solid rgba(255,255,255,0.06)", transition:"width 0.2s", flexShrink:0, overflow:"hidden" }}>
        <div style={{ padding:collapsed?"14px 8px":"14px 14px", borderBottom:"1px solid rgba(255,255,255,0.06)", display:"flex", alignItems:"center", gap:9, justifyContent:collapsed?"center":"flex-start" }}>
          <div onClick={()=>setCollapsed(!collapsed)} style={{ width:30, height:30, borderRadius:7, flexShrink:0, background:"#fff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, fontWeight:800, color:"#1B1D21", cursor:"pointer" }}>N</div>
          {!collapsed&&<span style={{ color:"#fff", fontSize:13, fontWeight:800, letterSpacing:1.5 }}>NETWORK</span>}
        </div>
        <nav style={{ flex:1, overflowY:"auto", padding:"8px 0" }}>
          {CHANNELS.map((item,i)=>{
            if(item.divider) return collapsed?null:<div key={i} style={{ padding:"12px 16px 4px", fontSize:10, fontWeight:700, color:"rgba(255,255,255,0.2)", letterSpacing:0.8, textTransform:"uppercase" }}>{item.label}</div>;
            const act = channel===item.path;
            return (
              <div key={item.path} onClick={()=>setChannel(item.path)} style={{ display:"flex", alignItems:"center", gap:9, padding:collapsed?"8px 0":"8px 12px", margin:"1px 6px", borderRadius:7, cursor:"pointer", background:act?"rgba(255,255,255,0.1)":"transparent", color:act?"#fff":"rgba(255,255,255,0.5)", fontSize:13, fontWeight:act?600:400, transition:"all 0.12s", justifyContent:collapsed?"center":"flex-start" }}
                onMouseEnter={e=>{if(!act)e.currentTarget.style.background="rgba(255,255,255,0.04)"}}
                onMouseLeave={e=>{if(!act)e.currentTarget.style.background="transparent"}}
                title={collapsed?item.label:""}>
                <span style={{ fontSize:15, flexShrink:0 }}>{item.icon}</span>
                {!collapsed&&<span>{item.label}</span>}
              </div>
            );
          })}
        </nav>
        <div style={{ padding:collapsed?"12px 6px":"12px 14px", borderTop:"1px solid rgba(255,255,255,0.06)" }}>
          {!collapsed&&user&&(
            <div style={{ marginBottom:8 }}>
              <div style={{ fontSize:12.5, fontWeight:600, color:"rgba(255,255,255,0.7)" }}>{user.name}</div>
              <div style={{ fontSize:10.5, color:"rgba(255,255,255,0.3)", marginTop:1 }}>{user.org}</div>
            </div>
          )}
          <button onClick={logout} style={{ width:"100%", padding:collapsed?"6px":"7px 12px", borderRadius:6, border:"1px solid rgba(255,255,255,0.1)", background:"transparent", color:"rgba(255,255,255,0.4)", fontSize:12, cursor:"pointer", fontFamily:"inherit" }}>{collapsed?"🚪":"로그아웃"}</button>
        </div>
      </aside>

      {/* MAIN */}
      <main style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column" }}>
        {/* HOME */}
        {channel==="home"&&(
          <div style={{ flex:1, overflowY:"auto", background:"#F7F8FA", padding:"32px 36px" }}>
            <div style={{ marginBottom:28 }}>
              <h1 style={{ fontSize:22, fontWeight:800, marginBottom:5 }}>{greet()}, {user?.name}님 👋</h1>
              <p style={{ fontSize:13.5, color:"#9CA3AF" }}>{user?.org} · {user?.role==="hq_admin"?"관리자":user?.role==="hq_staff"?"직원":"파트너사"}</p>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(175px, 1fr))", gap:10, marginBottom:32 }}>
              {QUICK.map((l,i)=>(
                <div key={l.path} onClick={()=>setChannel(l.path)} style={{ padding:"16px", borderRadius:12, background:"#fff", border:"1px solid #ECEDF0", cursor:"pointer", transition:"all 0.2s", boxShadow:"0 1px 3px rgba(0,0,0,0.03)", animation:`fadeUp 0.3s ease ${i*0.03}s both` }}
                  onMouseEnter={e=>{e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,0.05)";e.currentTarget.style.transform="translateY(-2px)"}}
                  onMouseLeave={e=>{e.currentTarget.style.boxShadow="0 1px 3px rgba(0,0,0,0.03)";e.currentTarget.style.transform="translateY(0)"}}>
                  <div style={{ width:36, height:36, borderRadius:9, background:l.color+"10", display:"flex", alignItems:"center", justifyContent:"center", fontSize:17, marginBottom:10 }}>{l.icon}</div>
                  <div style={{ fontSize:13, fontWeight:700, marginBottom:2 }}>{l.label}</div>
                  <div style={{ fontSize:11, color:"#9CA3AF" }}>{l.desc}</div>
                </div>
              ))}
            </div>
            <div style={{ background:"#fff", borderRadius:12, border:"1px solid #ECEDF0", overflow:"hidden" }}>
              <div style={{ padding:"12px 16px", borderBottom:"1px solid #F0F0F2", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <span style={{ fontSize:13, fontWeight:700 }}>📢 최근 공지</span>
                <span onClick={()=>setChannel("notices")} style={{ fontSize:12, color:"#3B82F6", fontWeight:600, cursor:"pointer" }}>더보기 →</span>
              </div>
              {[{t:"3월 입고 일정 안내",d:"03.03"},{t:"OK1 KS 배터리 관련 협의",d:"03.02"},{t:"2월 정산 완료 안내",d:"03.01"}].map((n,i)=>(
                <div key={i} style={{ padding:"10px 16px", borderBottom:i<2?"1px solid #F8F8FA":"none", display:"flex", justifyContent:"space-between", cursor:"pointer" }}
                  onMouseEnter={e=>e.currentTarget.style.background="#FAFBFC"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <span style={{ fontSize:13, fontWeight:600 }}>{n.t}</span>
                  <span style={{ fontSize:11.5, color:"#C0C3C8" }}>{n.d}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* MEETINGS */}
        {channel==="meetings"&&(
          <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
            <div style={{ height:52, borderBottom:"1px solid #ECEDF0", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 20px", background:"#fff", flexShrink:0 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontSize:18 }}>📋</span><span style={{ fontSize:16, fontWeight:700 }}>회의록</span>
              </div>
              <div style={{ display:"flex", gap:6 }}>
                <button style={{ padding:"6px 14px", borderRadius:7, border:"1px solid #E5E7EB", background:"#fff", fontSize:12.5, fontWeight:600, color:"#6B7280", cursor:"pointer", fontFamily:"inherit" }}>🔍 검색</button>
                <button style={{ padding:"6px 14px", borderRadius:7, border:"none", background:"#1E1E1E", fontSize:12.5, fontWeight:600, color:"#fff", cursor:"pointer", fontFamily:"inherit" }}>+ 회의록 작성</button>
              </div>
            </div>
            <div style={{ flex:1, overflowY:"auto", padding:"20px", background:"#F7F8FA" }}>
              {[
                { title:"3월 정기 운영 회의", date:"2026.03.03 (월) 10:00", loc:"본사 회의실 A", ppl:["김대표","박매니저","이과장"], status:"확정", dec:"OK1 KS 3월 추가 입고 5대 확정, 연체 회수 절차 강화", items:[{task:"3월 입고 일정 SE글로벌 확인",who:"박매니저",dl:"03.05"},{task:"연체 고객 리스트 정리",who:"이과장",dl:"03.04"}] },
                { title:"차량 정비 일정 협의", date:"2026.02.28 (금) 14:00", loc:"온라인 (Google Meet)", ppl:["김대표","정비팀장"], status:"공유완료", dec:"매월 1회 전 차량 점검, 정비 체크리스트 표준화", items:[{task:"점검 체크리스트 양식 작성",who:"정비팀장",dl:"03.07"}] },
              ].map((m,i)=>{
                const sc = m.status==="확정"?{bg:"#EFF6FF",c:"#1D4ED8",bd:"#BFDBFE"}:{bg:"#F0FDF4",c:"#15803D",bd:"#BBF7D0"};
                return (
                  <div key={i} style={{ background:"#fff", borderRadius:12, border:"1px solid #ECEDF0", marginBottom:12, overflow:"hidden", cursor:"pointer", transition:"all 0.15s" }}
                    onMouseEnter={e=>{e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,0.05)"}} onMouseLeave={e=>{e.currentTarget.style.boxShadow="none"}}>
                    <div style={{ padding:"16px 18px 12px", borderBottom:"1px solid #F5F5F7" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                        <span style={{ fontSize:15, fontWeight:700 }}>{m.title}</span>
                        <span style={{ padding:"2px 7px", borderRadius:4, fontSize:10.5, fontWeight:700, background:sc.bg, color:sc.c, border:`1px solid ${sc.bd}` }}>{m.status}</span>
                      </div>
                      <div style={{ display:"flex", gap:16, fontSize:12, color:"#9CA3AF" }}>
                        <span>📅 {m.date}</span><span>📍 {m.loc}</span><span>👥 {m.ppl.join(", ")}</span>
                      </div>
                    </div>
                    <div style={{ padding:"12px 18px" }}>
                      <div style={{ fontSize:11.5, fontWeight:700, color:"#6B7280", marginBottom:6 }}>결정 사항</div>
                      <div style={{ fontSize:13, color:"#374151", lineHeight:1.6 }}>{m.dec}</div>
                    </div>
                    <div style={{ padding:"0 18px 14px" }}>
                      <div style={{ fontSize:11.5, fontWeight:700, color:"#6B7280", marginBottom:6 }}>실행 항목</div>
                      {m.items.map((a,j)=>(
                        <div key={j} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 10px", borderRadius:6, background:"#FAFBFC", marginBottom:4, fontSize:12.5 }}>
                          <span style={{ width:16, height:16, borderRadius:4, border:"1.5px solid #D1D5DB", flexShrink:0 }}/>
                          <span style={{ flex:1, color:"#374151" }}>{a.task}</span>
                          <span style={{ color:"#3B82F6", fontWeight:600, fontSize:11.5 }}>{a.who}</span>
                          <span style={{ color:"#9CA3AF", fontSize:11 }}>~{a.dl}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* OTHER CHANNELS */}
        {channel!=="home"&&channel!=="meetings"&&(
          <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
            <div style={{ height:52, borderBottom:"1px solid #ECEDF0", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 20px", background:"#fff", flexShrink:0 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontSize:18 }}>{chInfo?.icon||activeChannel?.icon}</span>
                <span style={{ fontSize:16, fontWeight:700 }}>{chInfo?.label||activeChannel?.label}</span>
              </div>
              <div style={{ display:"flex", gap:6 }}>
                <button style={{ padding:"6px 14px", borderRadius:7, border:"1px solid #E5E7EB", background:"#fff", fontSize:12.5, fontWeight:600, color:"#6B7280", cursor:"pointer", fontFamily:"inherit" }}>🔍 검색</button>
                <button style={{ padding:"6px 14px", borderRadius:7, border:"none", background:"#1E1E1E", fontSize:12.5, fontWeight:600, color:"#fff", cursor:"pointer", fontFamily:"inherit" }}>+ 새로 작성</button>
              </div>
            </div>
            <div style={{ flex:1, overflowY:"auto", padding:"24px 20px", background:"#F7F8FA" }}>
              <div style={{ padding:36, borderRadius:14, background:"#fff", border:"1px dashed #D1D5DB", textAlign:"center" }}>
                <div style={{ fontSize:40, marginBottom:14 }}>{chInfo?.icon||"📋"}</div>
                <h3 style={{ fontSize:17, fontWeight:700, marginBottom:6 }}>{chInfo?.label||activeChannel?.label}</h3>
                <p style={{ fontSize:13, color:"#9CA3AF", lineHeight:1.6, marginBottom:16 }}>{CH_DESC[channel]||""}</p>
                <div style={{ display:"inline-block", padding:"10px 16px", background:"#FAFBFC", borderRadius:8, fontSize:12, color:"#9CA3AF" }}>
                  데모 버전입니다. Supabase 연동 후 실제 데이터가 표시됩니다.
                </div>
              </div>
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
