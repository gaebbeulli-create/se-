<div style={{marginBottom:mob?16:28}}><h1 style={{fontSize:mob?18:22,fontWeight:800,marginBottom:4}}>{gr()}, {u?.name}님 👋</h1><p style={{fontSize:12.5,color:"#9CA3AF"}}>{u?.org} · <B t={u?.role||"유저"}/></p></div>
<div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(auto-fill,minmax(185px,1fr))",gap:mob?8:10,marginBottom:mob?16:32}}>
{QK.map((l,i)=>(
<div key={l.p} onClick={()=>go(l.p)} style={{padding:mob?12:16,borderRadius:10,background:"#fff",border:"1px solid #ECEDF0",cursor:"pointer",transition:"all .2s",animation:"fadeUp .3s ease "+i*.03+"s both"}}>
<div style={{width:mob?28:36,height:mob?28:36,borderRadius:mob?7:9,background:l.c+"10",display:"flex",alignItems:"center",justifyContent:"center",fontSize:mob?14:17,marginBottom:mob?6:10}}>{l.i}</div>
<div style={{fontSize:mob?12:13,fontWeight:700,marginBottom:1}}>{l.l}</div><div style={{fontSize:mob?10:11,color:"#9CA3AF"}}>{l.d}</div></div>))}
</div>
<div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:10}}>
<div style={{background:"#fff",borderRadius:10,border:"1px solid #ECEDF0",overflow:"hidden"}}>
<div style={{padding:"10px 14px",borderBottom:"1px solid #F0F0F2",display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12.5,fontWeight:700}}>📢 최근 공지</span><span onClick={()=>go("notices")} style={{fontSize:11,color:"#3B82F6",fontWeight:600,cursor:"pointer"}}>더보기 →</span></div>
{notices.slice(0,3).map((n,i)=><div key={n.id} style={{padding:"8px 14px",borderBottom:i<2?"1px solid #F8F8FA":"none",display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,fontWeight:600,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginRight:8}}>{n.tt}</span><span style={{fontSize:10.5,color:"#C0C3C8",flexShrink:0}}>{n.dt}</span></div>)}
</div>
<div style={{background:"#fff",borderRadius:10,border:"1px solid #ECEDF0",padding:mob?12:16}}>
<div style={{fontSize:12.5,fontWeight:700,marginBottom:10}}>📊 현황</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
<div style={{padding:8,background:"#F7F8FA",borderRadius:7,textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,color:"#1D4ED8"}}>{contracts.filter(c=>c.st==="진행").length}</div><div style={{fontSize:10,color:"#9CA3AF"}}>진행 계약</div></div>
<div style={{padding:8,background:"#F7F8FA",borderRadius:7,textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,color:"#DC2626"}}>{contracts.filter(c=>c.st==="연체").length}</div><div style={{fontSize:10,color:"#9CA3AF"}}>연체</div></div>
<div style={{padding:8,background:"#F7F8FA",borderRadius:7,textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,color:"#15803D"}}>{vehicles.filter(v=>v.st==="가용").length}</div><div style={{fontSize:10,color:"#9CA3AF"}}>가용 차량</div></div>
<div style={{padding:8,background:"#F7F8FA",borderRadius:7,textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,color:"#F59E0B"}}>{incidents.filter(i=>i.st!=="종결").length}</div><div style={{fontSize:10,color:"#9CA3AF"}}>진행 사고</div></div>
</div></div>
</div></div>
):ch==="settings"?(
<div style={{flex:1,overflowY:"auto",background:"#F7F8FA",padding:mob?"16px 12px":"24px 20px"}}>{RC()}</div>
):(
<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
{/* CHANNEL HEADER */}
<div style={{borderBottom:"1px solid #ECEDF0",display:"flex",alignItems:"center",justifyContent:"space-between",padding:mob?"10px 12px":"0 16px",background:"#fff",flexShrink:0,height:mob?"auto":52,flexWrap:mob?"wrap":"nowrap",gap:mob?8:0}}>
<div style={{display:"flex",alignItems:"center",gap:6}}>
{mob&&<button onClick={()=>setSideOpen(true)} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",padding:0}}>☰</button>}
<span style={{fontSize:mob?16:18}}>{ci?.i||ai?.i}</span><span style={{fontSize:mob?14:16,fontWeight:700}}>{ci?.l||ai?.l}</span></div>
<div style={{display:"flex",gap:5,alignItems:"center",width:mob?"100%":"auto"}}>
<input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 검색..." style={{padding:"6px 10px",borderRadius:7,border:"1px solid #E5E7EB",fontSize:12,flex:mob?1:"none",width:mob?"auto":150,fontFamily:"inherit"}}/>
{(ch!=="settings"||(ch==="settings"&&isAdmin))&&<button onClick={()=>{setFm({});setEditId(null);setMdl(mm[ch]);}} style={{padding:"6px 12px",borderRadius:7,border:"none",background:"#1E1E1E",fontSize:11.5,fontWeight:600,color:"#fff",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>{ch==="settings"?"+ 사용자 등록":"+ 작성"}</button>}
</div></div>
<div style={{flex:1,overflowY:"auto",padding:mob?12:16,background:"#F7F8FA"}}>{RC()}</div>
</div>
)}
</main>

{/* MOBILE BOTTOM TAB */}
{mob&&<div style={{position:"fixed",bottom:0,left:0,right:0,height:56,background:"#fff",borderTop:"1px solid #ECEDF0",display:"flex",zIndex:100}}>
{tabs.map(t=>{const act=ch===t.p;return <div key={t.p} onClick={()=>go(t.p)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,cursor:"pointer",color:act?"#1E1E1E":"#9CA3AF",transition:"color .15s"}}>
<span style={{fontSize:18}}>{t.i}</span><span style={{fontSize:9,fontWeight:act?700:500}}>{t.l}</span></div>;})}
<div onClick={()=>setSideOpen(true)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,cursor:"pointer",color:sideOpen?"#1E1E1E":"#9CA3AF"}}>
<span style={{fontSize:18}}>☰</span><span style={{fontSize:9,fontWeight:500}}>메뉴</span></div>
</div>}

</div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
