/* 파일 업로드 모달 컴포넌트 (hooks 규칙 준수를 위해 App 외부 정의) */
function FileUploadArea({ic,mob,onUpload,folders,fmFld,onFldChange}){
const[udOver,setUdOver]=useState(false);
const[uFiles,setUFiles]=useState([]);
const fmtSz=(b)=>{if(b<1024)return b+"B";if(b<1048576)return(b/1024).toFixed(0)+"KB";return(b/1048576).toFixed(1)+"MB";};
const getExt=(n)=>{const d=n.lastIndexOf(".");return d>=0?n.slice(d+1).toLowerCase():"";};
const isImgExt=(ext)=>["png","jpg","jpeg","gif","webp","bmp","svg"].includes(ext);
const procFiles=(fl)=>{
  Array.from(fl).forEach(f=>{
    const ext=getExt(f.name)||"etc";
    const sz=fmtSz(f.size);
    if(isImgExt(ext)){
      const reader=new FileReader();
      reader.onload=(ev)=>{setUFiles(p=>[...p,{file:f,nm:f.name,tp:ext,sz:sz,preview:ev.target.result,data:ev.target.result}]);};
      reader.readAsDataURL(f);
    }else{
      setUFiles(p=>[...p,{file:f,nm:f.name,tp:ext,sz:sz,preview:null,data:null}]);
    }
  });
};
const rmFile=(i)=>{setUFiles(p=>p.filter((_,idx)=>idx!==i));};
const IS2={width:"100%",padding:"10px 12px",border:"1.5px solid #E5E7EB",borderRadius:8,fontSize:13,background:"#fff",fontFamily:"inherit",color:"#1E1E1E"};
const LS2={display:"block",fontSize:12,fontWeight:600,color:"#374151",marginBottom:4};
const BTN2={marginTop:16,width:"100%",padding:"12px",borderRadius:10,border:"none",background:"#1E1E1E",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"};
return(<div>
<div onDragOver={e=>{e.preventDefault();e.stopPropagation();setUdOver(true);}} onDragLeave={e=>{e.preventDefault();e.stopPropagation();setUdOver(false);}} onDrop={e=>{e.preventDefault();e.stopPropagation();setUdOver(false);if(e.dataTransfer.files.length)procFiles(e.dataTransfer.files);}} onClick={()=>document.getElementById("fu-inp")?.click()}
  style={{border:udOver?"2.5px dashed #3B82F6":"2px dashed #D1D5DB",borderRadius:12,padding:mob?"28px 16px":"36px 24px",textAlign:"center",cursor:"pointer",background:udOver?"#EFF6FF":"#FAFBFC",transition:"all .2s",marginBottom:12}}>
<input id="fu-inp" type="file" multiple style={{display:"none"}} onChange={e=>{if(e.target.files.length)procFiles(e.target.files);e.target.value="";}}/>
<div style={{fontSize:36,marginBottom:8}}>{udOver?"📂":"📎"}</div>
<div style={{fontSize:13,fontWeight:700,color:udOver?"#1D4ED8":"#374151",marginBottom:4}}>{udOver?"여기에 놓으세요!":"파일을 드래그하거나 클릭하여 선택"}</div>
<div style={{fontSize:11,color:"#9CA3AF"}}>여러 파일을 한번에 업로드할 수 있습니다</div>
</div>
{uFiles.length>0&&<div style={{marginBottom:12}}>
<div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:6}}>📋 선택된 파일 ({uFiles.length}개)</div>
<div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:240,overflowY:"auto"}}>
{uFiles.map((uf,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:"#fff",borderRadius:8,border:"1px solid #ECEDF0"}}>
{uf.preview?<img src={uf.preview} style={{width:36,height:36,borderRadius:5,objectFit:"cover",border:"1px solid #ECEDF0",flexShrink:0}}/>
:<div style={{width:36,height:36,borderRadius:5,background:(ic||{})[uf.tp]||"#6B7280",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:800,textTransform:"uppercase",flexShrink:0}}>{uf.tp}</div>}
<div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{uf.nm}</div><div style={{fontSize:10,color:"#9CA3AF"}}>{uf.sz}</div></div>
<button onClick={e=>{e.stopPropagation();rmFile(i);}} style={{width:22,height:22,borderRadius:5,border:"none",background:"#FEF2F2",color:"#DC2626",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
</div>)}
</div></div>}
<div style={{marginBottom:12}}><label style={LS2}>저장 폴더</label><select style={IS2} value={fmFld!=null?fmFld:""} onChange={e=>onFldChange(e.target.value)}><option value="">루트 (미분류)</option>{(folders||[]).map(fd=><option key={fd.id} value={fd.nm}>{fd.nm}</option>)}</select></div>
<button onClick={()=>{if(uFiles.length)onUpload(uFiles);}} disabled={!uFiles.length} style={{...BTN2,opacity:uFiles.length?1:0.4,cursor:uFiles.length?"pointer":"not-allowed"}}>{uFiles.length?uFiles.length+"개 파일 업로드":"파일을 선택하세요"}</button>
</div>);
}

const notify=(icon,channel,title,body)=>{
  const id=Date.now()+Math.random();
  setToasts(p=>[{id,icon,channel,title,body,fade:false},...p].slice(0,5));
  setTimeout(()=>setToasts(p=>p.map(t=>t.id===id?{...t,fade:true}:t)),5000);
  setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),5500);
  /* 브라우저 Notification API */
  if("Notification"in window){
    if(Notification.permission==="granted"){try{new Notification("NETWORK · "+channel,{body:title+(body?"\n"+body:""),icon:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231E1E1E'/><text x='50' y='68' text-anchor='middle' fill='white' font-size='48' font-weight='900'>N</text></svg>",tag:"nw-"+id});}catch(e){}}

};

  }else{
    setSchedule(p=>[...p,{id:nid(p),tt:fm.tt||"",dt:fm.dt||td,tp:fm.tp||"기타",tm:fm.tm||"",loc:fm.loc||"",who:fm.who||"",memo:fm.memo||"",st:"예정"}]);

/* 미니 캘린더 */
const calY=+calMonth.split("-")[0], calM=+calMonth.split("-")[1];
const calFirst=new Date(calY,calM-1,1);
const calDays=new Date(calY,calM,0).getDate();
const calStartDay=calFirst.getDay();/* 0=Sun */
const calCells=[];
for(let i=0;i<calStartDay;i++)calCells.push(null);
for(let d=1;d<=calDays;d++)calCells.push(d);
const prevMonth=()=>{const d=new Date(calY,calM-2,1);setCalMonth(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"));};
const nextMonth=()=>{const d=new Date(calY,calM,1);setCalMonth(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"));};
const eventsOnDay=(d)=>{const ds=calY+"-"+String(calM).padStart(2,"0")+"-"+String(d).padStart(2,"0");return schedule.filter(s=>s.dt===ds);};
const isToday=(d)=>{const t=new Date();return t.getFullYear()===calY&&t.getMonth()+1===calM&&t.getDate()===d;};

/* D-day 계산 */
const dday=(dt)=>{const t=new Date(td);const e=new Date(dt);const diff=Math.ceil((e-t)/(1000*60*60*24));if(diff===0)return "오늘";if(diff>0)return "D-"+diff;return "D+"+Math.abs(diff);};

return(<>

<div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
{sts.map(s=><button key={s} onClick={()=>setScFil(s)} style={fbtn(s==="전체"&&scFil==="전체"?"전체":s===scFil?s:"_")}
  style={{padding:"5px 10px",borderRadius:6,border:scFil===s?"none":"1px solid #E5E7EB",background:scFil===s?"#1E1E1E":"#fff",color:scFil===s?"#fff":"#6B7280",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{s}</button>)}

{tps.map(t=><button key={t} onClick={()=>setScTpFil(t)}

<div style={{marginLeft:"auto",display:"flex",gap:2}}>
<button onClick={()=>setScView("list")} style={{padding:"5px 10px",borderRadius:"6px 0 0 6px",border:"1px solid #E5E7EB",background:scView==="list"?"#1E1E1E":"#fff",color:scView==="list"?"#fff":"#6B7280",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>📋</button>
<button onClick={()=>setScView("cal")} style={{padding:"5px 10px",borderRadius:"0 6px 6px 0",border:"1px solid #E5E7EB",borderLeft:"none",background:scView==="cal"?"#1E1E1E":"#fff",color:scView==="cal"?"#fff":"#6B7280",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>📅</button>
</div>
</div>

<span style={{fontSize:14,fontWeight:700}}>{calY}년 {calM}월</span>
<button onClick={nextMonth} style={{background:"none",border:"none",fontSize:16,cursor:"pointer",padding:"4px 8px"}}>▶</button>
</div>
<div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
{["일","월","화","수","목","금","토"].map((d,i)=><div key={d} style={{padding:"6px 0",textAlign:"center",fontSize:10,fontWeight:700,color:i===0?"#DC2626":i===6?"#3B82F6":"#9CA3AF",borderBottom:"1px solid #F0F0F2"}}>{d}</div>)}
{calCells.map((d,i)=>{

    <div style={{fontSize:mob?10:11,fontWeight:today?800:500,color:today?"#D97706":dow===0?"#DC2626":dow===6?"#3B82F6":"#374151",textAlign:"center",marginBottom:2}}>{d}</div>
    <div style={{display:"flex",flexDirection:"column",gap:1}}>
    {evts.slice(0,mob?1:2).map(ev=><div key={ev.id} onClick={e=>{e.stopPropagation();setScDet(ev);}} style={{padding:"1px 3px",borderRadius:3,background:tc[ev.tp]||"#6B7280",color:"#fff",fontSize:mob?7:8,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",cursor:"pointer"}}>{mob?"":tci[ev.tp]||""}{ev.tt}</div>)}
    {evts.length>(mob?1:2)&&<div style={{fontSize:7,color:"#9CA3AF",textAlign:"center"}}>+{evts.length-(mob?1:2)}</div>}
    </div>
  </div>;
})}
</div>
</div>}

{/* 리스트 뷰 */}
{scView==="list"&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
{fl.map(s=><div key={s.id} onClick={()=>setScDet(s)} style={{background:"#fff",borderRadius:10,border:"1px solid #ECEDF0",padding:mob?"10px 12px":"12px 16px",display:"flex",alignItems:"center",gap:mob?8:12,cursor:"pointer",transition:"all .15s",opacity:s.st==="완료"?0.6:1}} onMouseEnter={e=>e.currentTarget.style.borderColor="#D1D5DB"} onMouseLeave={e=>e.currentTarget.style.borderColor="#ECEDF0"}>
<div style={{width:mob?36:42,height:mob?36:42,borderRadius:mob?8:10,background:(tc[s.tp]||"#6B7280")+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:mob?16:20,flexShrink:0}}>{tci[s.tp]||"📌"}</div>
<div style={{flex:1,minWidth:0}}>
  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
    <span style={{fontSize:13,fontWeight:700,textDecoration:s.st==="완료"?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{s.tt}</span>
    <span style={{fontSize:10,fontWeight:700,color:tc[s.tp]||"#6B7280",flexShrink:0,padding:"2px 6px",borderRadius:4,background:(tc[s.tp]||"#6B7280")+"15"}}>{s.tp}</span>
  </div>
  <div style={{display:"flex",alignItems:"center",gap:8,fontSize:11,color:"#9CA3AF",flexWrap:"wrap"}}>
    <span>📅 {s.dt}{s.tm?" "+s.tm:""}</span>
    {s.loc&&<span>📍 {s.loc}</span>}
    {s.who&&!mob&&<span>👤 {s.who}</span>}
  </div>
</div>
<div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
  <span style={{fontSize:10,fontWeight:700,color:s.st==="완료"?"#15803D":new Date(s.dt)< new Date(td)?"#DC2626":"#D97706",padding:"2px 6px",borderRadius:4,background:s.st==="완료"?"#F0FDF4":new Date(s.dt)<new Date(td)?"#FEF2F2":"#FFFBEB"}}>{s.st==="완료"?"✅ 완료":dday(s.dt)}</span>
  <div style={{display:"flex",gap:3}} onClick={e=>e.stopPropagation()}>
    <button style={{...DB,fontSize:10,padding:"3px 6px"}} onClick={()=>toggleDone(s.id)}>{s.st==="완료"?"↩":"✓"}</button>
    <button style={{...DB,fontSize:10,padding:"3px 6px"}} onClick={()=>startEdit(s,"s")}>수정</button>
    <button style={{...DBR,fontSize:10,padding:"3px 6px"}} onClick={()=>del(s.id)}>삭제</button>
  </div>
</div>
</div>)}
{!fl.length&&<div style={{padding:24,textAlign:"center",color:"#9CA3AF",fontSize:13}}>일정이 없습니다</div>}
</div>}

{/* 일정 등록/수정 모달 */}
<Mdl open={mdl==="s"} onClose={X} title={editId?"일정 수정":"일정 추가"} mob={mob}>
<div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:10}}>
<div style={{gridColumn:mob?"1":"1/3"}}><label style={LS}>제목</label><input style={IS} value={fm.tt||""} onChange={e=>F2("tt",e.target.value)} placeholder="일정 제목"/></div>

<div><label style={LS}>유형</label><select style={IS} value={fm.tp||""} onChange={e=>F2("tp",e.target.value)}><option value="">선택</option><option>미팅</option><option>내부회의</option><option>설명회</option><option>출장</option><option>기타</option></select></div>
<div><label style={LS}>장소</label><input style={IS} value={fm.loc||""} onChange={e=>F2("loc",e.target.value)} placeholder="장소, 온라인 등"/></div>
<div style={{gridColumn:mob?"1":"1/3"}}><label style={LS}>담당자</label><input style={IS} value={fm.who||""} onChange={e=>F2("who",e.target.value)} placeholder="김대표, 박매니저"/></div>
{editId&&<div><label style={LS}>상태</label><select style={IS} value={fm.st||"예정"} onChange={e=>F2("st",e.target.value)}><option>예정</option><option>완료</option></select></div>}
</div>
<div style={{marginTop:10}}><label style={LS}>메모</label><textarea style={{...IS,height:70}} value={fm.memo||""} onChange={e=>F2("memo",e.target.value)} placeholder="상세 내용, 준비사항 등"/></div>
<button onClick={save} style={BTN}>{editId?"저장":"추가하기"}</button>
</Mdl>

<div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,paddingBottom:14,borderBottom:"1px solid #F0F0F2"}}>
  <div style={{width:48,height:48,borderRadius:12,background:(tc[scDet.tp]||"#6B7280")+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{tci[scDet.tp]||"📌"}</div>
  <div style={{flex:1}}>
    <div style={{fontSize:16,fontWeight:700,lineHeight:1.3,textDecoration:scDet.st==="완료"?"line-through":"none"}}>{scDet.tt}</div>
    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}>
      <span style={{padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700,background:(tc[scDet.tp]||"#6B7280")+"15",color:tc[scDet.tp]||"#6B7280"}}>{scDet.tp}</span>
      <span style={{fontSize:11,fontWeight:700,color:scDet.st==="완료"?"#15803D":"#D97706"}}>{scDet.st==="완료"?"✅ 완료":dday(scDet.dt)}</span>
    </div>
  </div>
</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
  <div style={{padding:"10px 12px",background:"#F7F8FA",borderRadius:8}}><div style={{fontSize:10,color:"#9CA3AF",marginBottom:2}}>📅 날짜</div><div style={{fontSize:13,fontWeight:600}}>{scDet.dt}</div></div>
  <div style={{padding:"10px 12px",background:"#F7F8FA",borderRadius:8}}><div style={{fontSize:10,color:"#9CA3AF",marginBottom:2}}>⏰ 시간</div><div style={{fontSize:13,fontWeight:600}}>{scDet.tm||"미정"}</div></div>
  <div style={{padding:"10px 12px",background:"#F7F8FA",borderRadius:8}}><div style={{fontSize:10,color:"#9CA3AF",marginBottom:2}}>📍 장소</div><div style={{fontSize:13,fontWeight:600}}>{scDet.loc||"미정"}</div></div>
  <div style={{padding:"10px 12px",background:"#F7F8FA",borderRadius:8}}><div style={{fontSize:10,color:"#9CA3AF",marginBottom:2}}>👤 담당자</div><div style={{fontSize:13,fontWeight:600}}>{scDet.who||"미정"}</div></div>

/* == 파일공유 == */
if(ch==="files"){
const ic={"xlsx":"#217346","pdf":"#DC2626","docx":"#2B579A","png":"#F59E0B","jpg":"#F59E0B","zip":"#6B7280","hwp":"#1D4ED8"};
const dragId=fileDragId;const setDragId=setFileDragId;
const dragOver=fileDragOver;const setDragOver=setFileDragOver;

const flInFolder=files.filter(f=>(f.fld||"")===(curFld)&&dtMatch(f.dt)&&(!sq||f.nm.toLowerCase().includes(sq)));
const foldersInRoot=folders.filter(fd=>!sq||fd.nm.includes(sq));

/* 폴더 추가 */
const addFolder=()=>{
  const nm=prompt("새 폴더 이름을 입력하세요:");
  if(!nm||!nm.trim())return;
  if(folders.find(f=>f.nm===nm.trim())){alert("이미 같은 이름의 폴더가 있습니다.");return;}
  setFolders(p=>[{id:nid(p),nm:nm.trim(),cr:u?.name||"",dt:td},...p]);
};
/* 폴더 삭제 */
const delFolder=(fid)=>{
  const fd=folders.find(f=>f.id===fid);
  if(!fd)return;
  const cnt=files.filter(f=>f.fld===fd.nm).length;
  if(!confirmDel("폴더 '"+fd.nm+"'를 삭제합니다."+(cnt>0?" 내부 파일 "+cnt+"개는 루트로 이동됩니다.":"")))return;
  /* 내부 파일 루트로 이동 */
  if(cnt>0)setFiles(p=>p.map(f=>f.fld===fd.nm?{...f,fld:""}:f));
  setFolders(p=>p.filter(f=>f.id!==fid));
  if(curFld===fd.nm)setCurFld("");
};
/* 폴더 이름 변경 */
const renameFolder=(fid)=>{
  const fd=folders.find(f=>f.id===fid);
  if(!fd)return;
  const nm=prompt("새 폴더 이름:",fd.nm);
  if(!nm||!nm.trim()||nm.trim()===fd.nm)return;
  const oldNm=fd.nm;
  setFolders(p=>p.map(f=>f.id===fid?{...f,nm:nm.trim()}:f));
  setFiles(p=>p.map(f=>f.fld===oldNm?{...f,fld:nm.trim()}:f));
  if(curFld===oldNm)setCurFld(nm.trim());
};

/* 파일 삭제 */
const del=id=>{if(confirmDel())setFiles(p=>p.filter(f=>f.id!==id));setSelFiles(p=>p.filter(x=>x!==id));};

/* 드래그 앤 드롭 */
const onDragStart=(e,fId)=>{setDragId(fId);e.dataTransfer.effectAllowed="move";};
const onDragEnd=()=>{setDragId(null);setDragOver(null);};
const onFolderDragOver=(e,fldNm)=>{e.preventDefault();e.dataTransfer.dropEffect="move";setDragOver(fldNm);};
const onFolderDragLeave=()=>{setDragOver(null);};
const onFolderDrop=(e,fldNm)=>{
  e.preventDefault();setDragOver(null);
  if(dragId!=null){
    setFiles(p=>p.map(f=>f.id===dragId?{...f,fld:fldNm}:f));
    setDragId(null);
    notify("📁","파일공유","파일 이동",files.find(f=>f.id===dragId)?.nm+" → "+(fldNm||"루트"));
  }
};
/* 루트 드롭 (폴더 밖으로 이동) */
const onRootDrop=(e)=>{
  e.preventDefault();setDragOver(null);
  if(dragId!=null&&curFld){
    setFiles(p=>p.map(f=>f.id===dragId?{...f,fld:""}:f));
    setDragId(null);
  }
};

/* 선택 토글 */
const toggleSel=(id)=>{setSelFiles(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);};
/* 선택 파일 이동 */
const moveSelected=(targetFld)=>{
  setFiles(p=>p.map(f=>selFiles.includes(f.id)?{...f,fld:targetFld}:f));
  const cnt=selFiles.length;
  setSelFiles([]);setMoveModal(false);
  notify("📁","파일공유",cnt+"개 파일 이동","→ "+(targetFld||"루트"));
};

const isImgTp=(tp)=>["png","jpg","jpeg","gif","webp","bmp","svg"].includes(tp);
const fileRow=(f)=>(
<div key={f.id} draggable onDragStart={e=>onDragStart(e,f.id)} onDragEnd={onDragEnd} onClick={()=>setFileDet(f)}
  style={{background:dragId===f.id?"#EFF6FF":"#fff",borderRadius:8,border:selFiles.includes(f.id)?"2px solid #3B82F6":"1px solid #ECEDF0",padding:"10px 14px",display:"flex",alignItems:"center",gap:10,cursor:"grab",transition:"all .15s",opacity:dragId===f.id?0.5:1}}>
<input type="checkbox" checked={selFiles.includes(f.id)} onChange={()=>toggleSel(f.id)} style={{flexShrink:0,cursor:"pointer"}} onClick={e=>e.stopPropagation()}/>
{f.preview&&isImgTp(f.tp)?<img src={f.preview} style={{width:36,height:36,borderRadius:6,objectFit:"cover",border:"1px solid #ECEDF0",flexShrink:0}} onClick={e=>{e.stopPropagation();openImg([f.preview],0);}}/>
:<div style={{width:36,height:36,borderRadius:6,background:ic[f.tp]||"#6B7280",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,textTransform:"uppercase",flexShrink:0}}>{f.tp}</div>}
<div style={{flex:1,minWidth:0}}><div style={{fontSize:12.5,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.nm}</div><div style={{fontSize:10.5,color:"#9CA3AF"}}>{f.sz} · {f.au} · {f.dt}{f.fld?<span style={{marginLeft:4,padding:"1px 5px",borderRadius:3,background:"#F3F4F6",fontSize:9,color:"#6B7280"}}>📁 {f.fld}</span>:null}</div></div>
<div style={{display:"flex",gap:3,flexShrink:0}} onClick={e=>e.stopPropagation()}><button style={DBR} onClick={()=>del(f.id)}>삭제</button></div>
</div>);

return(<>
{/* 상단 바: 폴더 경로 + 액션 */}

<div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600}}>{c.nm} <span style={{color:"#6B7280",fontWeight:400}}>({c.no})</span></div><div style={{fontSize:10.5,color:"#9CA3AF"}}>{c.md} · {c.vn}</div></div>
<div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:12,fontWeight:700,color:"#DC2626"}}>{c.up?Number(c.up).toLocaleString()+"원":"-"}</div><div style={{fontSize:9,color:"#9CA3AF"}}>미수금</div></div>
</div>):<div style={{padding:14,textAlign:"center",color:"#15803D",fontSize:12}}>✅ 연체 계약 없음</div>}
</div>

{/* 진행 중 사고 */}
<div style={{background:"#fff",borderRadius:10,border:"1px solid #ECEDF0",overflow:"hidden"}}>
<div style={{padding:"10px 14px",borderBottom:"1px solid #F0F0F2",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12.5,fontWeight:700}}>⚠️ 진행 중 사고</span><span onClick={()=>go("incidents")} style={{fontSize:11,color:"#3B82F6",fontWeight:600,cursor:"pointer"}}>더보기 →</span></div>
{incidents.filter(i=>i.st!=="종결").length?incidents.filter(i=>i.st!=="종결").map((ic2,i)=><div key={ic2.id} style={{padding:"8px 14px",borderBottom:"1px solid #F8F8FA",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
<div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:5}}><span>{ic2.no}</span><B t={ic2.sv}/></div><div style={{fontSize:10.5,color:"#9CA3AF"}}>{ic2.vn} · {ic2.tp} · {ic2.dt}</div></div>
<B t={ic2.st}/>
</div>):<div style={{padding:14,textAlign:"center",color:"#15803D",fontSize:12}}>✅ 진행 중 사고 없음</div>}
</div>

</div>
</div>
):ch==="settings"?(
<div style={{flex:1,overflowY:"auto",background:"#F7F8FA",padding:mob?"16px 12px":"24px 20px"}}>{RC()}</div>
):(
<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
{/* CHANNEL HEADER */}
<div style={{borderBottom:"1px solid #ECEDF0",display:"flex",alignItems:"center",justifyContent:"space-between",padding:mob?"10px 12px":"0 16px",background:"#fff",flexShrink:0,height:mob?"auto":52,flexWrap:mob?"wrap":"nowrap",gap:mob?8:0}}>
<div style={{display:"flex",alignItems:"center",gap:6}}>
{mob&&<button onClick={()=>setSideOpen(true)} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",padding:0}}>☰</button>}
<span style={{fontSize:mob?16:18}}>{ci?.i||ai?.i}</span><span style={{fontSize:mob?14:16,fontWeight:700}}>{ci?.l||ai?.l}</span></div>
<div style={{display:"flex",gap:5,alignItems:"center",width:mob?"100%":"auto"}}>
<input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 검색..." style={{padding:"6px 10px",borderRadius:7,border:"1px solid #E5E7EB",fontSize:12,flex:mob?1:"none",width:mob?"auto":150,fontFamily:"inherit"}}/>
{(ch!=="settings"||(ch==="settings"&&isAdmin))&&<button onClick={()=>{setFm({});setEditId(null);setMdl(mm[ch]);}} style={{padding:"6px 12px",borderRadius:7,border:"none",background:"#1E1E1E",fontSize:11.5,fontWeight:600,color:"#fff",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>{ch==="settings"?"+ 사용자 등록":ch==="files"?"+ 업로드":"+ 작성"}</button>}
</div></div>
<div style={{flex:1,overflowY:"auto",padding:mob?12:16,background:"#F7F8FA"}}>{RC()}</div>
</div>
)}
</main>

{/* MOBILE BOTTOM TAB */}
{mob&&<div style={{position:"fixed",bottom:0,left:0,right:0,height:56,background:"#fff",borderTop:"1px solid #ECEDF0",display:"flex",zIndex:100}}>
{tabs.map(t=>{const act=ch===t.p;return <div key={t.p} onClick={()=>go(t.p)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,cursor:"pointer",color:act?"#1E1E1E":"#9CA3AF",transition:"color .15s"}}>
<span style={{fontSize:18}}>{t.i}</span><span style={{fontSize:9,fontWeight:act?700:500}}>{t.l}</span></div>;})}
<div onClick={()=>setSideOpen(true)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,cursor:"pointer",color:sideOpen?"#1E1E1E":"#9CA3AF"}}>
<span style={{fontSize:18}}>☰</span><span style={{fontSize:9,fontWeight:500}}>메뉴</span></div>
</div>}

</div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
