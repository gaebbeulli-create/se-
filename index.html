{toasts.length>0&&<div style={{position:"fixed",top:mob?12:16,right:mob?12:20,zIndex:99999,display:"flex",flexDirection:"column",gap:8,width:mob?"calc(100% - 24px)":360}}>{toasts.map(t=><div key={t.id} style={{background:"#1E1E1E",color:"#fff",borderRadius:12,padding:"14px 16px",boxShadow:"0 8px 32px rgba(0,0,0,.25)",animation:t.fade?"toastOut .4s ease forwards":"toastIn .3s ease",cursor:"pointer"}} onClick={()=>setToasts(p=>p.filter(x=>x.id!==t.id))}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:t.body?6:0}}><span style={{fontSize:18}}>{t.icon}</span><div style={{flex:1,minWidth:0}}><div style={{fontSize:10,color:"rgba(255,255,255,.5)",fontWeight:600,marginBottom:1}}>{t.channel}</div><div style={{fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div></div><span style={{fontSize:10,color:"rgba(255,255,255,.3)",flexShrink:0}}>지금</span></div>{t.body&&<div style={{fontSize:11.5,color:"rgba(255,255,255,.7)",lineHeight:1.5,whiteSpace:"pre-wrap",maxHeight:80,overflow:"hidden",paddingLeft:26}}>{t.body}</div>}</div>)}</div>}
{/* 모바일 오버레이 */}
{mob&&sideOpen&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",zIndex:998}} onClick={()=>setSideOpen(false)}/>}
{/* 사이드바 */}
{(!mob||sideOpen)&&<div style={{width:mob?"260px":(col?60:220),height:"100vh",background:"#1B1D21",display:"flex",flexDirection:"column",flexShrink:0,position:mob?"fixed":"relative",zIndex:mob?999:1,animation:mob?"slideLeft .2s ease":"none",transition:mob?"none":"width .2s ease"}}>
<div style={{padding:col?"14px 0":"14px 16px",display:"flex",alignItems:"center",justifyContent:col?"center":"space-between",borderBottom:"1px solid rgba(255,255,255,.06)"}}>{!col&&<div style={{display:"flex",alignItems:"center",gap:7}}><div style={{width:28,height:28,borderRadius:6,background:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900}}>N</div><span style={{color:"#fff",fontSize:14,fontWeight:700}}>NETWORK</span></div>}<button onClick={()=>{if(mob)setSideOpen(false);else setCol(!col);}} style={{background:"none",border:"none",color:"rgba(255,255,255,.4)",cursor:"pointer",fontSize:16,padding:4}}>{col?"▶":"◀"}</button></div>
<div style={{flex:1,overflowY:"auto",padding:"8px 0"}}>{CHS.map((c,idx)=>c.d?<div key={idx} style={{padding:col?"6px 0":"6px 16px",fontSize:10,fontWeight:600,color:"rgba(255,255,255,.25)",textTransform:"uppercase",textAlign:col?"center":"left",marginTop:idx?8:0}}>{col?"-":c.l}</div>
:<div key={c.p} onClick={()=>go(c.p)} style={{display:"flex",alignItems:"center",gap:9,padding:col?"8px 0":"8px 12px",margin:"1px 6px",borderRadius:7,cursor:"pointer",background:ch===c.p?"rgba(255,255,255,.1)":"transparent",color:ch===c.p?"#fff":"rgba(255,255,255,.5)",fontSize:13,fontWeight:ch===c.p?600:400,justifyContent:col?"center":"flex-start"}} title={col?c.l:""}><span style={{fontSize:15,flexShrink:0}}>{c.i}</span>{!col&&<span>{c.l}</span>}</div>)}</div>
<div style={{borderTop:"1px solid rgba(255,255,255,.06)",padding:"8px 0"}}>
<div onClick={()=>go("settings")} style={{display:"flex",alignItems:"center",gap:9,padding:col?"8px 0":"8px 12px",margin:"1px 6px",borderRadius:7,cursor:"pointer",background:ch==="settings"?"rgba(255,255,255,.1)":"transparent",color:ch==="settings"?"#fff":"rgba(255,255,255,.5)",fontSize:13,fontWeight:ch==="settings"?600:400,justifyContent:col?"center":"flex-start"}} title={col?"설정":""}><span style={{fontSize:15,flexShrink:0}}>⚙️</span>{!col&&<span>설정</span>}</div>
</div></div>}
{/* 메인 */}
<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
<div style={{padding:mob?"12px 12px":"14px 20px",background:"#fff",borderBottom:"1px solid #ECEDF0",display:"flex",justifyContent:"space-between",alignItems:mob?"flex-start":"center",flexDirection:mob?"column":"row",gap:mob?8:0}}>
<div style={{display:"flex",alignItems:"center",gap:8}}>{mob&&<button onClick={()=>setSideOpen(true)} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",padding:0}}>☰</button>}
<span style={{fontSize:mob?16:18}}>{ci?.i||ai?.i}</span><span style={{fontSize:mob?14:16,fontWeight:700}}>{ci?.l||ai?.l}</span></div>
<div style={{display:"flex",gap:5,alignItems:"center",width:mob?"100%":"auto"}}>
<input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 검색..." style={{padding:"6px 10px",borderRadius:7,border:"1px solid #E5E7EB",fontSize:12,flex:mob?1:"none",width:mob?"auto":150,fontFamily:"inherit"}}/>
{(ch!=="settings"||(ch==="settings"&&isAdmin))&&<button onClick={()=>{setFm({});setEditId(null);setMdl(mm[ch]);}} style={{padding:"6px 12px",borderRadius:7,border:"none",background:"#1E1E1E",fontSize:11.5,fontWeight:600,color:"#fff",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>{ch==="settings"?"+ 사용자 등록":"+ 작성"}</button>}
</div></div>
<div style={{flex:1,overflowY:"auto",padding:mob?12:16,background:"#F7F8FA"}}>{dbReady?RC():<div style={{textAlign:"center",padding:40,color:"#9CA3AF"}}>데이터 불러오는 중...</div>}</div>
</div>
{/* 모바일 하단 탭 */}
{mob&&<div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #ECEDF0",display:"flex",justifyContent:"space-around",padding:"6px 0 env(safe-area-inset-bottom)",zIndex:900}}>
{tabs.map(t=><div key={t.p} onClick={()=>go(t.p)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 8px",cursor:"pointer",color:ch===t.p?"#1E1E1E":"#9CA3AF"}}><span style={{fontSize:18}}>{t.i}</span><span style={{fontSize:9,fontWeight:ch===t.p?700:400}}>{t.l}</span></div>)}</div>}
{/* 로그아웃 */}
<button onClick={logout} style={{position:"fixed",bottom:mob?60:16,right:16,padding:"6px 12px",borderRadius:8,border:"1px solid #E5E7EB",background:"#fff",fontSize:11,color:"#6B7280",cursor:"pointer",fontFamily:"inherit",zIndex:899}}>로그아웃</button>
</div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
